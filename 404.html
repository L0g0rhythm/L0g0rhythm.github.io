<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página Não Encontrada</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Você pode adicionar estilos aqui ou no style.css principal */
        .error-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 80vh; /* Ocupa boa parte da tela */
            text-align: center;
            padding: 20px;
            color: #e0e0e0; /* Cor do texto clara */
        }

        .error-container h1 {
            font-size: 2em;
            color: #ff6b6b; /* Cor de destaque para o erro */
            margin-bottom: 15px;
        }

        .error-container p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .error-container a {
            color: #9a4efc; /* Cor do link (mesma do tema?) */
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #9a4efc;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .error-container a:hover {
            background-color: #9a4efc;
            color: #ffffff;
        }

         /* Estilo para o ícone do GitHub (se quiser adicionar) */
        .github-icon {
            font-size: 3em; /* Ajuste o tamanho */
            margin-top: 40px;
            color: #c0c0e0;
            /* Adicione animação de loading se desejar */
        }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="background-container"></div>

    <div class="error-container">
        <h1>404: Página não encontrada</h1>
        <p>🧐 Whoops... esta rota não existe no meu universo!</p>

        <a href="/">Voltar para o Início</a>

        </div>
</body>
</html>
